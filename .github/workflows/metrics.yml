# Visit https://github.com/lowlighter/metrics#-documentation for full reference
# Generates a combined metrics dashboard at ./github-metrics.svg
# Requires a classic PAT (scopes: repo, read:user) stored as secret METRICS_TOKEN.
name: Metrics
on:
  # Schedule updates (Every Sunday at MIDNIGHT CST / 06:00 UTC)
  schedule: [{cron: "0 6 * * 0"}]
  # Run manually and on each commit to the default branch
  workflow_dispatch:
  push: {branches: ["main", "master"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}

          # Options
          user: therealjustsnow
          template: classic
          base: header, activity, community, repositories, metadata
          base_indepth: yes
          config_timezone: America/Chicago

          #achievements
          plugin_achievements: yes
          plugin_achievements_display: detailed
          plugin_achievements_secrets: yes
          plugin_achievements_threshold: C

          #Recent Activity
          plugin_activity: yes
          plugin_activity_days: 14
          plugin_activity_filter: all
          plugin_activity_limit: 5
          plugin_activity_load: 400
          plugin_activity_timestamps: yes
          plugin_activity_visibility: all

          #Coding Habits
          plugin_habits: yes
          plugin_habits_charts: yes
          plugin_habits_charts_type: graph
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_from: 400
          plugin_habits_languages_limit: 8
          plugin_habits_languages_threshold: 0%

          #Intro
          plugin_introduction: yes
          plugin_introduction_title: yes

          #Coding commit calendar
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

          #Include forks
          repositories_forks: yes
          repositories_affiliations: ""

          #Notable contributions
          plugin_notable: yes
          plugin_notable_filter: stars, forks, watchers, commits, commits.user, commits.user%, maintainer
          plugin_notable_from: all
          plugin_notable_self: no
          plugin_notable_repositories: yes
          plugin_notable_indepth: yes
          plugin_notable_types: issue, pull_request, commit
