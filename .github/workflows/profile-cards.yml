name: GitHub Profile Summary Cards

# Generates GitHub stat/language cards as committed SVGs (all themes, incl.
# the "transparent" set used on index.html). Output lives in
# ./profile-summary-card-output/<theme>/<n>-<card>.svg
# Uses the built-in GITHUB_TOKEN — no personal access token needed.

on:
  schedule: # Sunday 00:00 CST (06:00 UTC)
    - cron: "0 6 * * 0"
  workflow_dispatch:
  push:
    branches: ["main", "master"]

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-cards
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate GitHub Profile Summary Cards
        uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          USERNAME: ${{ github.repository_owner }}
          UTC_OFFSET: -6
