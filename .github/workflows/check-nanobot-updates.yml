name: Check NanoBot updates

# Watches the upstream NanoBot repo for new commits on its default branch.
# When the pinned `external/NanoBot` submodule falls behind it:
#   1. opens (or refreshes) a PR bumping the submodule pointer to latest
#   2. opens (or refreshes) a tracking issue with a docs-review checklist
#
# NOTE: for the PR step to work, the repo setting
# Settings -> Actions -> General -> "Allow GitHub Actions to create and
# approve pull requests" must be enabled.

on:
  schedule:
    - cron: '0 6 * * *'   # daily, 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      UPSTREAM: therealjustsnow/NanoBot
      PR_BRANCH: bot/nanobot-submodule-bump
      ISSUE_TITLE: 'Docs review: NanoBot has new commits'
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compare submodule pointer with upstream
        id: cmp
        run: |
          set -euo pipefail
          pinned=$(git ls-tree HEAD external/NanoBot | awk '{print $3}')
          branch=$(git ls-remote --symref "https://github.com/$UPSTREAM" HEAD \
            | awk '/^ref:/ {sub("refs/heads/","",$2); print $2}')
          latest=$(git ls-remote "https://github.com/$UPSTREAM" "refs/heads/$branch" | awk '{print $1}')
          if [ -z "$pinned" ] || [ -z "$latest" ]; then
            echo "Could not resolve pinned ($pinned) or upstream ($latest) revision." >&2
            exit 1
          fi
          echo "pinned=$pinned" >> "$GITHUB_OUTPUT"
          echo "latest=$latest" >> "$GITHUB_OUTPUT"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"
          if [ "$pinned" = "$latest" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Submodule already at latest ($latest)."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Submodule behind: $pinned -> $latest"
          fi

      - name: Build commit list and bodies
        if: steps.cmp.outputs.changed == 'true'
        run: |
          set -euo pipefail
          gh api "repos/$UPSTREAM/compare/${{ steps.cmp.outputs.pinned }}...${{ steps.cmp.outputs.latest }}" \
            --jq '.commits[] | "- [`\(.sha[0:7])`](\(.html_url)) \(.commit.message | split("\n")[0])"' \
            > commits.md
          count=$(wc -l < commits.md | tr -d ' ')

          {
            echo "Upstream [\`$UPSTREAM\`](https://github.com/$UPSTREAM) has **$count** new commit(s) on \`${{ steps.cmp.outputs.branch }}\` since the pinned submodule revision."
            echo
            echo "- Pinned: \`${{ steps.cmp.outputs.pinned }}\`"
            echo "- Latest: \`${{ steps.cmp.outputs.latest }}\`"
            echo
          } > summary.md

          cat summary.md commits.md > pr-body.md

          {
            cat summary.md
            echo "### Docs review checklist"
            echo
            echo "Confirm \`nanobot-docs.html\` and \`docs/\` still match NanoBot after these changes:"
            echo
            sed 's/^- /- [ ] /' commits.md
          } > issue-body.md

      - name: Bump submodule pointer
        if: steps.cmp.outputs.changed == 'true'
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git update-index --cacheinfo 160000 "${{ steps.cmp.outputs.latest }}" external/NanoBot
          git checkout -B "$PR_BRANCH"
          git commit -m "chore: bump NanoBot submodule to ${{ steps.cmp.outputs.latest }}" \
            -m "Auto-generated by the Check NanoBot updates workflow."
          git push -f origin "$PR_BRANCH"

      - name: Open or refresh pull request
        if: steps.cmp.outputs.changed == 'true'
        run: |
          set -euo pipefail
          num=$(gh pr list --head "$PR_BRANCH" --state open --json number --jq '.[0].number // empty')
          if [ -n "$num" ]; then
            gh pr edit "$num" --body-file pr-body.md
            echo "Refreshed PR #$num."
          else
            gh pr create --head "$PR_BRANCH" \
              --title "chore: bump NanoBot submodule to latest" \
              --body-file pr-body.md
          fi

      - name: Open or refresh tracking issue
        if: steps.cmp.outputs.changed == 'true'
        run: |
          set -euo pipefail
          num=$(gh issue list --state open --json number,title \
            --jq ".[] | select(.title==\"$ISSUE_TITLE\") | .number" | head -1)
          if [ -n "$num" ]; then
            gh issue edit "$num" --body-file issue-body.md
            echo "Refreshed issue #$num."
          else
            gh issue create --title "$ISSUE_TITLE" --body-file issue-body.md
          fi
